<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071014"/>
      <stop offset="0.55" stop-color="#0b1f1c"/>
      <stop offset="1" stop-color="#1b160c"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4a8"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f15b2a"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8fdcc9"/>
    </marker>
    <style>
      .title{font:800 42px Artifakt,Inter,Arial,sans-serif;fill:#f8fafc;letter-spacing:-1.4px}
      .label{font:700 23px Artifakt,Inter,Arial,sans-serif;fill:#f8fafc}
      .small{font:500 18px Artifakt,Inter,Arial,sans-serif;fill:#cbd5e1}
      .mono{font:600 18px 'JetBrains Mono','DejaVu Sans Mono',monospace;fill:#d1fae5}
      .muted{fill:#94a3b8}
      .panel{fill:rgba(7,17,21,.78);stroke:rgba(255,255,255,.15);stroke-width:2}
      .chip{fill:rgba(45,212,168,.12);stroke:rgba(45,212,168,.40);stroke-width:2}
      .core-idle{fill:#111827;stroke:#334155;stroke-width:2}
      .core-hot{fill:url(#hot);stroke:#eafff8;stroke-width:2;filter:url(#glow)}
      .core-warm{fill:url(#warm);stroke:#ffe4d6;stroke-width:2;filter:url(#glow)}
      .line{stroke:#8fdcc9;stroke-width:3;fill:none;marker-end:url(#arrow);opacity:.92}
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <g opacity=".16">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200 M0 640 H1200" stroke="#fff" stroke-width="1"/>
    <path d="M80 0 V720 M160 0 V720 M240 0 V720 M320 0 V720 M400 0 V720 M480 0 V720 M560 0 V720 M640 0 V720 M720 0 V720 M800 0 V720 M880 0 V720 M960 0 V720 M1040 0 V720 M1120 0 V720" stroke="#fff" stroke-width="1"/>
  </g>

  <text x="70" y="72" class="title">Visual Threadpool Demo: 1 Core vs 4 Cores</text>
  <text x="72" y="112" class="small">Run the same CPU burn workload with different worker counts, then watch Linux schedule work across cores.</text>

  <rect x="70" y="150" width="320" height="150" rx="24" class="panel"/>
  <text x="100" y="195" class="label">Terminal 1</text>
  <text x="100" y="235" class="mono">make run-burn-1</text>
  <text x="100" y="268" class="mono">make run-burn-4</text>

  <rect x="70" y="340" width="320" height="150" rx="24" class="panel"/>
  <text x="100" y="385" class="label">Terminal 2</text>
  <text x="100" y="425" class="mono">htop</text>
  <text x="100" y="458" class="mono">top -H -p &lt;pid&gt;</text>

  <rect x="465" y="160" width="260" height="270" rx="28" class="panel"/>
  <text x="495" y="205" class="label">05_core_burn.c</text>
  <text x="495" y="245" class="small">pthread_create()</text>
  <text x="495" y="278" class="small">burn_worker()</text>
  <text x="495" y="311" class="small">sched_getcpu()</text>
  <text x="495" y="360" class="mono">worker ith</text>
  <text x="495" y="392" class="mono">CPU id output</text>

  <path d="M390 225 C420 225 435 225 462 235" class="line"/>
  <path d="M390 425 C420 425 440 400 462 372" class="line"/>

  <rect x="800" y="140" width="320" height="205" rx="26" class="panel"/>
  <text x="830" y="185" class="label">1 worker</text>
  <text x="830" y="220" class="small">One busy pthread usually lights up one logical CPU.</text>
  <g transform="translate(835 250)">
    <rect x="0" y="0" width="48" height="48" rx="10" class="core-hot"/><text x="17" y="31" class="mono" fill="#04130f">0</text>
    <rect x="62" y="0" width="48" height="48" rx="10" class="core-idle"/><text x="79" y="31" class="mono muted">1</text>
    <rect x="124" y="0" width="48" height="48" rx="10" class="core-idle"/><text x="141" y="31" class="mono muted">2</text>
    <rect x="186" y="0" width="48" height="48" rx="10" class="core-idle"/><text x="203" y="31" class="mono muted">3</text>
  </g>

  <rect x="800" y="390" width="320" height="240" rx="26" class="panel"/>
  <text x="830" y="435" class="label">4 workers</text>
  <text x="830" y="470" class="small">Four runnable workers can occupy multiple logical CPUs.</text>
  <g transform="translate(835 505)">
    <rect x="0" y="0" width="48" height="48" rx="10" class="core-hot"/><text x="17" y="31" class="mono" fill="#04130f">0</text>
    <rect x="62" y="0" width="48" height="48" rx="10" class="core-warm"/><text x="79" y="31" class="mono" fill="#190b04">1</text>
    <rect x="124" y="0" width="48" height="48" rx="10" class="core-hot"/><text x="141" y="31" class="mono" fill="#04130f">2</text>
    <rect x="186" y="0" width="48" height="48" rx="10" class="core-warm"/><text x="203" y="31" class="mono" fill="#190b04">3</text>
  </g>
  <text x="835" y="595" class="mono">worker 2 finished on cpu 6</text>

  <path d="M725 272 C760 250 770 240 797 235" class="line"/>
  <path d="M725 350 C765 390 772 505 797 515" class="line"/>

  <rect x="70" y="560" width="650" height="78" rx="20" class="chip"/>
  <text x="100" y="606" class="label">Teaching point:</text>
  <text x="285" y="606" class="small">the threadpool contract turns one function into core-parallel work.</text>
</svg>
